<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 人工智慧簡介測試網頁</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .content-img { width: 100%; max-width: 600px; height: auto; border-radius: 8px; margin: 20px 0; }
        .description { background: #f9f9f9; padding: 15px; border-left: 5px solid #3498db; }
    </style>
</head>
<body>

    <!-- 文字標題 -->
    <h1>什麼是 AI 人工智慧？</h1>

    <!-- 圖片 (此處使用 placeholder 示意圖) -->
    <img src="https://picsum.photos/200/300.jpg" 
     alt="AI 科技示意圖" 
     class="content-img">

    <!-- 內容說明 -->
    <div class="description">
        <p><strong>人工智慧 (Artificial Intelligence, AI)</strong> 是由人類製造出來的機器所表現出的智能。它通常透過電腦程式來呈現人類智慧的技術，能解決與人類認知相關的問題，例如：</p>
        <ul>
            <li><strong>學習與分析：</strong> 透過大數據進行模式辨識與自我改進。</li>
            <li><strong>生成能力：</strong> 例如 <strong>ChatGPT</strong> 等生成式 AI，能撰寫文案、產出程式碼甚至生成精美圖片。</li>
            <li><strong>自動化：</strong> 應用在智慧工廠、瑕疵檢查或網路流量監控中，提高工作效率。</li>
        </ul>
        <p>現今 AI 已經成為我們生活的一部分，從手機裡的語音助理到專業的網頁設計工具，都能見到其身影。</p>
    </div>

</body>
